<section class="rounded-2xl bg-[#0d1f14] text-white p-6 shadow-lg" aria-label="Total stock product summary">
  <p class="text-xs font-medium text-gray-400 uppercase tracking-wide">Total All Stock Product</p>

  <p class="text-4xl font-extrabold mt-2 mb-5 tracking-tight" aria-label="{{ available() | number }} available stock">
    {{ available() | number }}
  </p>

  <!-- Progress Bar -->
  <div class="w-full bg-gray-700 rounded-full h-2 mb-5" role="progressbar" [attr.aria-valuenow]="progressPct()"
    aria-valuemin="0" aria-valuemax="100" [attr.aria-label]="progressPct() + '% sold out'">
    <div class="bg-[#7ed47e] h-2 rounded-full transition-all duration-700" [style.width.%]="progressPct()">
    </div>
  </div>

  <!-- Stats Row -->
  <div class="flex justify-between items-end">
    <div>
      <div class="flex items-center gap-1.5 mb-1">
        <span class="w-2 h-2 rounded-full bg-[#7ed47e]" aria-hidden="true"></span>
        <p class="text-xs text-gray-400">Sold Out</p>
      </div>
      <p class="text-xl font-bold" aria-label="{{ soldOut() | number }} sold out">
        {{ soldOut() | number }}
      </p>
    </div>
    <div class="text-right">
      <div class="flex items-center justify-end gap-1.5 mb-1">
        <p class="text-xs text-gray-400">Total Stock</p>
        <span class="w-2 h-2 rounded-full bg-gray-500" aria-hidden="true"></span>
      </div>
      <p class="text-xl font-bold" aria-label="{{ total() | number }} total stock">
        {{ total() | number }}
      </p>
    </div>
  </div>
</section>
