name: Deploy Angular to AWS

on:
  push:
    branches:
      - main        # triggers on merge to main
  pull_request:
    branches:
      - main        # runs build check on PRs (no deploy)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Run tests (optional but recommended)
      # - name: Run tests
        # run: npm run test -- --watch=false --browsers=ChromeHeadless

      # 5. Build for production
      - name: Build
        run: npm run build -- --configuration production
        env:
          NODE_ENV: production
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FINNHUB_WS_URL: ${{ secrets.FINNHUB_WS_URL }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID_DY_DB: ${{ secrets.AWS_ACCESS_KEY_ID_DY_DB }}
          AWS_SECRET_ACCESS_KEY_DY_DB: ${{ secrets.AWS_SECRET_ACCESS_KEY_DY_DB }}
          AWS_TABLE_NAME: ${{ secrets.AWS_TABLE_NAME }}

      # 6. Pre-compress JS and CSS assets with gzip
      - name: Compress assets
        run: |
          find dist/fin-dash/browser -type f \( -name "*.js" -o -name "*.css" \) | while read f; do
            gzip -9 -k "$f"
            mv "${f}.gz" "$f"
          done

      # 7. Configure AWS credentials
      - name: Configure AWS credentials
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 8. Sync build output to S3
      - name: Deploy to S3
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          # Upload compressed JS files with Content-Encoding header
          aws s3 sync dist/fin-dash/browser/ s3://${{ secrets.S3_BUCKET }} \
            --delete \
            --exclude "*" \
            --include "*.js" \
            --cache-control "public, max-age=31536000, immutable" \
            --content-encoding gzip \
            --content-type "application/javascript"

          # Upload compressed CSS files with Content-Encoding header
          aws s3 sync dist/fin-dash/browser/ s3://${{ secrets.S3_BUCKET }} \
            --exclude "*" \
            --include "*.css" \
            --cache-control "public, max-age=31536000, immutable" \
            --content-encoding gzip \
            --content-type "text/css"

          # Upload all remaining assets (images, fonts, etc.) without compression
          aws s3 sync dist/fin-dash/browser/ s3://${{ secrets.S3_BUCKET }} \
            --exclude "*.js" \
            --exclude "*.css" \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"

          # index.html must never be cached
          aws s3 cp dist/fin-dash/browser/index.html s3://${{ secrets.S3_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      # 8. Invalidate CloudFront cache
      - name: Invalidate CloudFront
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DIST_ID }} \
            --paths "/*"